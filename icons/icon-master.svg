<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Sydney Fishing app icon · deep-ocean ground + aqua-accented fish.
       Full-bleed background keeps it safe as a maskable PWA/iOS icon. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#13384f"/>
      <stop offset="1" stop-color="#07151f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.14" r="0.95">
      <stop offset="0" stop-color="#1aa9b6" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#13b9c6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#glow)"/>
  <!-- aqua current swoosh under the fish -->
  <path d="M150 374 C 214 410, 304 424, 396 414" fill="none" stroke="#23d6cf" stroke-width="16" stroke-linecap="round"/>
  <!-- fish body (white) -->
  <path d="M172 250 C 236 168, 362 158, 452 200 C 477 228, 477 272, 452 300 C 362 342, 236 332, 172 250 Z" fill="#ffffff"/>
  <!-- tail -->
  <path d="M172 250 110 194 V 306 Z" fill="#ffffff"/>
  <!-- eye -->
  <circle cx="402" cy="226" r="16" fill="#0e2c42"/>
</svg>
